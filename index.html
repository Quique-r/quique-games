<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juegos de qu1_qu3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #00ffc8;
    --accent2: #ff4fa3;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --card: #18181f;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 0 1rem 4rem;
  }

  header {
    text-align: center;
    padding: 3rem 1rem 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    margin-top: 0.75rem;
  }

  .search-wrap {
    max-width: 560px;
    margin: 0 auto 2rem;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    padding: 12px 16px 12px 44px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder {
    color: var(--muted);
  }

  .stats {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 1.5rem;
    letter-spacing: 0.05em;
  }

  .stats span {
    color: var(--accent);
    font-weight: 700;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s, background 0.15s;
    cursor: default;
  }

  .game-card:hover {
    border-color: var(--accent);
    background: #1e1e28;
  }

  .game-num {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    min-width: 28px;
    letter-spacing: 0.05em;
  }

  .game-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    word-break: break-word;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-left: auto;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .game-card:hover .dot {
    opacity: 1;
  }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 4rem 1rem;
    grid-column: 1 / -1;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }

  .empty strong {
    display: block;
    color: var(--text);
    font-size: 16px;
    margin-bottom: 0.5rem;
    font-family: 'Space Grotesk', sans-serif;
  }

  footer {
    text-align: center;
    margin-top: 4rem;
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
  }

  footer a {
    color: var(--accent2);
    text-decoration: none;
  }
</style>
</head>
<body>

<header>
  <div class="tag">qu1_qu3 · Twitch</div>
  <h1>Juegos <span>instalados</span></h1>
  <p class="subtitle">Vota qué quieres ver en el stream</p>
</header>

<div class="search-wrap">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <input type="text" id="search" placeholder="Buscar juego..." autocomplete="off" spellcheck="false">
</div>

<p class="stats" id="stats">Cargando...</p>

<div class="grid" id="grid"></div>

<footer>
  <p>Actualizado automáticamente · <a href="https://twitch.tv/qu1_qu3" target="_blank">twitch.tv/qu1_qu3</a></p>
</footer>

<script>
const IGNORE = [
  "microsoft", ".net", "visual c++", "redistributable", "openal",
  "openjdk", "dosbox", "dos emulator", "thirdparty", "osd", "rayrun",
  "rvrgame", "cppfps", "crashsight", "bootstrappackagedgame", "ulllaunch",
  "bravo", "celled", "storybook", "superquest", "tfm", "thankyouverycool",
  "rayfan", "raykit", "tiltility", "penguincolony", "noiseomatic",
  "everhoodcustom", "moonscraper", "incision aug", "incision dec",
  "incision nov", "incision oct", "incision sept", "made with löve",
  "f2 res patcher", "fallout 2 hi-res", "falloutclient", "fsd",
  "lila", "pseudoregalia", "silas", "orion", "screen snail",
  "screenbound demo", "dont fret", "all day dying", "mr. pompy",
  "nowhere prophet", "bugs n' guns", "gravity circuit"
];

function shouldHide(name) {
  const n = name.toLowerCase();
  return IGNORE.some(bad => n.includes(bad));
}

let allGames = [];

async function loadGames() {
  try {
    const res = await fetch('games.json?t=' + Date.now());
    const data = await res.json();
    allGames = data.games.filter(g => !shouldHide(g));
    render(allGames);
  } catch(e) {
    document.getElementById('stats').textContent = 'Error cargando juegos';
  }
}

function render(games) {
  const grid = document.getElementById('grid');
  const stats = document.getElementById('stats');

  stats.innerHTML = '<span>' + games.length + '</span> juegos encontrados';

  if (games.length === 0) {
    grid.innerHTML = '<div class="empty"><strong>Sin resultados</strong>Intenta con otro nombre</div>';
    return;
  }

  grid.innerHTML = games.map((g, i) =>
    '<div class="game-card">' +
    '<span class="game-num">' + String(i + 1).padStart(2, '0') + '</span>' +
    '<span class="game-name">' + g + '</span>' +
    '<span class="dot" aria-hidden="true"></span>' +
    '</div>'
  ).join('');
}

document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { render(allGames); return; }
  render(allGames.filter(g => g.toLowerCase().includes(q)));
});

loadGames();
</script>
</body>
</html>
